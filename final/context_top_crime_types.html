</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-eb196e60bc298075b9e815a7401e731f"}, "mark": {"type": "bar"}, "encoding": {"color": {"field": "Primary Type", "legend": null, "scale": {"scheme": "tableau10"}, "type": "nominal"}, "tooltip": [{"field": "Primary Type", "title": "Crime type", "type": "nominal"}, {"field": "Reports", "title": "Reports", "type": "quantitative"}], "x": {"field": "Reports", "title": "Number of reported crimes", "type": "quantitative"}, "y": {"field": "Primary Type", "sort": "-x", "title": "Crime type", "type": "nominal"}}, "height": 360, "title": "The most common reported crime types in the past year", "width": 800, "$schema": "https://vega.github.io/schema/vega-lite/v5.8.0.json", "datasets": {"data-eb196e60bc298075b9e815a7401e731f": [{"Primary Type": "THEFT", "Reports": 53494}, {"Primary Type": "BATTERY", "Reports": 42503}, {"Primary Type": "CRIMINAL DAMAGE", "Reports": 26292}, {"Primary Type": "ASSAULT", "Reports": 21338}, {"Primary Type": "MOTOR VEHICLE THEFT", "Reports": 17605}, {"Primary Type": "OTHER OFFENSE", "Reports": 16090}, {"Primary Type": "DECEPTIVE PRACTICE", "Reports": 13744}, {"Primary Type": "BURGLARY", "Reports": 10971}, {"Primary Type": "NARCOTICS", "Reports": 6765}, {"Primary Type": "ROBBERY", "Reports": 5428}]}};
